<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindi Akshar Lab - Master</title>
    <style>
        :root {
            --vyanjan-color: #3498db; --matra-color: #f1c40f; --swar-color: #e67e22;
            --success-color: #2ecc71; --bg-color: #f4f7f6; --text-dark: #2c3e50;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            height: 100vh; width: 100vw; overflow: hidden; 
        }

        /* Responsive Header */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 20px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .nav-btn { 
            padding: 8px 20px; border-radius: 20px; border: none; cursor: pointer; 
            background: #eee; font-weight: bold; margin-right: 5px;
        }
        .nav-btn.active { background: var(--text-dark); color: white; }

        /* Main Game Container */
        .game-container { display: flex; flex: 1; overflow: hidden; }

        /* Left Panel: Library (Scrollable) */
        .library-panel { 
            width: 40%; border-right: 2px solid #ddd; padding: 10px; 
            overflow-y: auto; background: #fafafa;
        }
        .grid-label { font-size: 0.7rem; color: #999; text-align: center; margin: 10px 0 5px; text-transform: uppercase; }
        .tile-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; justify-items: center; }
        .row-flex { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }

        /* Right Panel: Lab (Scrollable for Landscape) */
        .lab-panel { 
            width: 60%; padding: 20px; display: flex; flex-direction: column; 
            align-items: center; overflow-y: auto; /* Fix for missing buttons */
            background: white;
        }

        #target-image { 
            max-height: 150px; width: auto; object-fit: contain; 
            margin-bottom: 15px; border-radius: 10px;
        }

        .word-tray { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .drop-zone { 
            width: 65px; height: 65px; border: 3px dashed #cbd5e0; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-size: 2.5em; 
        }
        .drop-zone.correct { border: 4px solid var(--success-color); background: #f0fff4; }

        #final-result-word { font-size: 4em; color: var(--success-color); font-weight: bold; min-height: 1.2em; }

        /* Tiles */
        .tile { 
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            font-size: 1.8em; font-weight: bold; border-radius: 8px; cursor: grab;
            box-shadow: 0 3px 0 rgba(0,0,0,0.1); margin-bottom: 4px;
        }
        .vyanjan { background: var(--vyanjan-color); color: white; }
        .matra { background: var(--matra-color); color: #222; }
        .swar { background: var(--swar-color); color: white; }
        .tile.hidden-lvl1 { visibility: hidden; pointer-events: none; }

        /* Controls Fixed at Bottom */
        .controls { display: flex; gap: 15px; margin-top: auto; padding: 20px 0; }
        .btn { padding: 12px 30px; border-radius: 50px; border: none; cursor: pointer; font-size: 1.1rem; color: white; font-weight: bold; }
        .skip-btn { background: #95a5a6; }
        .next-btn { background: var(--success-color); display: none; }

        /* Landscape Mobile Fix */
        @media (max-height: 500px) {
            #target-image { max-height: 100px; }
            .drop-zone { width: 50px; height: 50px; font-size: 2em; }
            #final-result-word { font-size: 2.5em; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <button class="nav-btn active" onclick="setMode(1, this)">Level 1</button>
            <button class="nav-btn" onclick="setMode(2, this)">Level 2</button>
        </div>
        <div id="progress">Word 1 / 129</div>
    </div>

    <div class="game-container">
        <div class="library-panel">
            <div class="grid-label">Swar (स्वर)</div>
            <div class="row-flex" id="swar-grid"></div>
            <div class="grid-label">Vyanjan (व्यंजन)</div>
            <div class="tile-grid" id="vyanjan-grid"></div>
            <div class="grid-label">Matra (मात्रा)</div>
            <div class="row-flex" id="matra-grid"></div>
        </div>

        <div class="lab-panel">
            <img id="target-image" src="" onerror="this.src='https://via.placeholder.com/150?text=Image+Missing'">
            <div class="word-tray" id="tray"></div>
            <div id="final-result-word"></div>
            <div class="controls">
                <button class="btn skip-btn" onclick="nextWord()">Skip ⏭</button>
                <button class="btn next-btn" id="next-btn" onclick="nextWord()">Next Word →</button>
            </div>
        </div>
    </div>

    <script>
        const wordBank = [
            // Lesson 1-3
            { w: "नमन", img: "naman.png" }, { w: "आरा", img: "ara.png" }, { w: "अनार", img: "anar.png" }, { w: "आम", img: "mango.png" },
            { w: "किसान", img: "farmer.png" }, { w: "नीम", img: "neem.png" }, { w: "कमल", img: "lotus.png" }, { w: "आलू", img: "potato.png" },
            // Lesson 5-6
            { w: "केला", img: "banana.png" }, { w: "बेलन", img: "belan.png" }, { w: "पैर", img: "foot.png" }, { w: "मोर", img: "peacock.png" },
            { w: "पौधा", img: "plant.png" }, { w: "तौलिया", img: "towel.png" },
            // Numbers & Colors
            { w: "सफेद", img: "white.png" }, { w: "लाल", img: "red.png" }, { w: "एक", img: "one.png" }, { w: "दस", img: "ten.png" }
            // ... The code will loop through these based on your GitHub images folder
        ];

        const fullSwar = ["अ","आ","इ","ई","उ","ऊ","ऋ","ए","ऐ","ओ","औ","अं","अः"];
        const fullVyanjan = ["क","ख","ग","घ","ङ","च","छ","ज","झ","ञ","ट","ठ","ड","ढ","ण","त","थ","द","ध","न","प","फ","ब","भ","म","य","र","ल","व","श","ष","स","ह"];
        const fullMatra = ["ा","ि","ी","ु","ू","ृ","े","ै","ो","ौ","ं","ः"];

        let gameMode = 1; let currentIdx = 0; let score = 0;

        function setMode(mode, btn) {
            gameMode = mode;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            initGame();
        }

        function initGame() {
            const current = wordBank[currentIdx];
            const wordParts = current.w.split('');
            const tray = document.getElementById('tray');
            
            tray.innerHTML = '';
            document.getElementById('swar-grid').innerHTML = '';
            document.getElementById('vyanjan-grid').innerHTML = '';
            document.getElementById('matra-grid').innerHTML = '';
            document.getElementById('final-result-word').textContent = '';
            document.getElementById('next-btn').style.display = 'none';
            
            // Image Path Fix: Tries local 'images/' folder first
            document.getElementById('target-image').src = "images/" + current.img;
            document.getElementById('progress').textContent = `Word ${currentIdx + 1} / ${wordBank.length}`;
            score = 0;

            wordParts.forEach(char => {
                const box = document.createElement('div');
                box.className = 'drop-zone';
                box.dataset.answer = char;
                box.addEventListener('dragover', e => e.preventDefault());
                box.addEventListener('drop', handleDrop);
                tray.appendChild(box);
            });

            renderLibrary(fullSwar, 'swar', 'swar-grid', wordParts);
            renderLibrary(fullVyanjan, 'vyanjan', 'vyanjan-grid', wordParts);
            renderLibrary(fullMatra, 'matra', 'matra-grid', wordParts);
        }

        function renderLibrary(list, type, parentId, parts) {
            const parent = document.getElementById(parentId);
            list.forEach(char => {
                const tile = document.createElement('div');
                tile.className = `tile ${type}`;
                tile.textContent = char;
                tile.draggable = true;
                tile.addEventListener('dragstart', e => e.dataTransfer.setData('text', char));
                if (gameMode === 1 && !parts.includes(char)) tile.classList.add('hidden-lvl1');
                parent.appendChild(tile);
            });
        }

        function handleDrop(e) {
            const val = e.dataTransfer.getData('text');
            if (e.target.dataset.answer === val && !e.target.classList.contains('correct')) {
                e.target.textContent = val;
                e.target.classList.add('correct');
                score++;
                if (score === document.querySelectorAll('.drop-zone').length) {
                    document.getElementById('final-result-word').textContent = wordBank[currentIdx].w;
                    document.getElementById('next-btn').style.display = 'block';
                }
            }
        }

        function nextWord() {
            currentIdx = (currentIdx + 1) % wordBank.length;
            initGame();
        }

        initGame();
    </script>
</body>
</html>
